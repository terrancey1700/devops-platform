---
- name: Install nginx
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: Deploy custom nginx index page
  ansible.builtin.template:
    src: index.html.j2
    dest: /usr/share/nginx/html/index.html
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Enable and start nginx
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
    