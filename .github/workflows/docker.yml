name: Docker CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/nginx/**"
      - ".github/workflows/docker.yml"

  push:
    branches:
      - main
    paths:
      - "apps/nginx/**"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish nginx image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/nginx
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/terrancey1700/devops-platform-nginx:latest
            ghcr.io/terrancey1700/devops-platform-nginx:sha-${{ github.sha }}