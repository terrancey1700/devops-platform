name: Docker CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/nginx/**"
      - ".github/workflows/docker.yml"

  push:
    branches:
      - main
    paths:
      - "apps/nginx/**"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and scan nginx image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build nginx image for security scanning
        uses: docker/build-push-action@v6
        with:
          context: ./apps/nginx
          push: false
          load: true
          tags: |
            ghcr.io/terrancey1700/devops-platform-nginx:sha-${{ github.sha }}

      - name: Scan nginx image for critical vulnerabilities
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ghcr.io/terrancey1700/devops-platform-nginx:sha-${{ github.sha }}
        format: table
        severity: critical
        ignore-unfixed: true
        exit-code: "1"
